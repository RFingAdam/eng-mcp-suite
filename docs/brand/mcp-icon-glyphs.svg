<?xml version="1.0" encoding="UTF-8"?>
<!--
  eng-mcp-suite icon glyph sprite
  ================================
  15 monochrome domain glyphs sized to fit a 160×160 slot inside the
  logo-template.svg badge. Each <symbol> is referenceable by id.

  USAGE in a per-MCP logo:
    `use href="mcp-icon-glyphs.svg#g-waveform"`
    (or, if inlined into a single banner SVG, copy the relevant `symbol`
    contents into the glyph-slot group in logo-template.svg).

  CONVENTIONS:
    - viewBox is 0 0 160 160 for every symbol
    - All strokes use `currentColor` so the calling SVG controls hue
      via class="accent-stroke" (which sets `color:` on a parent style)
    - stroke-width: 2 (hairline-consistent with lineforge banner)
    - stroke-linecap: round, stroke-linejoin: round
    - No fills (or `none`), unless the shape genuinely needs solid mass

  COVERAGE → MCP suggestions:
    g-waveform     → mcp-rf-test, mcp-rs-siggen, rf domain generic
    g-antenna      → mcp-nec2-antenna, mcp-cst-studio (antenna mode)
    g-scope        → mcp-rs-spectrum-analyzer
    g-vna          → copper-mountain-vna-mcp
    g-siggen       → mcp-rs-siggen (alternate)
    g-cmw          → mcp-rs-cmw500
    g-stackup      → mcp-pcb-emcopilot
    g-schematic    → mcp-ltspice-qucs
    g-emc-chamber  → mcp-emc-regulations
    g-cube         → mcp-blender, mcp-openems (3D EM)
    g-diagram      → drawio-engineering-mcp
    g-terminal     → mcp-remote-access
    g-grid         → hfss-agent, full-wave/mesh
    g-transline    → lineforge (matches existing cross-section motif)
    g-hex          → eng-mcp-suite umbrella mark
-->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute">
  <defs>

    <!-- ─────────── g-waveform: sinusoid + ground rail ─────────── -->
    <symbol id="g-waveform" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M 8 80 Q 28 30, 48 80 T 88 80 T 128 80 T 168 80"
              stroke-opacity="0.95"/>
        <path d="M 8 100 Q 28 70, 48 100 T 88 100 T 128 100 T 168 100"
              stroke-opacity="0.55"/>
        <line x1="8" y1="140" x2="152" y2="140" stroke-opacity="0.6"/>
        <line x1="8" y1="140" x2="8" y2="146" stroke-opacity="0.6"/>
        <line x1="80" y1="140" x2="80" y2="146" stroke-opacity="0.6"/>
        <line x1="152" y1="140" x2="152" y2="146" stroke-opacity="0.6"/>
      </g>
    </symbol>

    <!-- ─────────── g-antenna: dipole + radiation lobes ─────────── -->
    <symbol id="g-antenna" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <line x1="80" y1="20" x2="80" y2="74"/>
        <line x1="80" y1="86" x2="80" y2="140"/>
        <line x1="74" y1="80" x2="86" y2="80"/>
        <path d="M 80 28 Q 40 56, 40 96 Q 40 132, 80 132" stroke-opacity="0.55"/>
        <path d="M 80 28 Q 120 56, 120 96 Q 120 132, 80 132" stroke-opacity="0.55"/>
        <path d="M 80 44 Q 56 64, 56 96 Q 56 124, 80 124" stroke-opacity="0.35"/>
        <path d="M 80 44 Q 104 64, 104 96 Q 104 124, 80 124" stroke-opacity="0.35"/>
        <circle cx="80" cy="80" r="3" fill="currentColor"/>
      </g>
    </symbol>

    <!-- ─────────── g-scope: oscilloscope screen + trace ─────────── -->
    <symbol id="g-scope" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="16" y="24" width="128" height="92" rx="6" stroke-opacity="0.7"/>
        <line x1="16" y1="70"  x2="144" y2="70"  stroke-opacity="0.25"/>
        <line x1="80" y1="24"  x2="80"  y2="116" stroke-opacity="0.25"/>
        <line x1="48" y1="24"  x2="48"  y2="116" stroke-opacity="0.15"/>
        <line x1="112" y1="24" x2="112" y2="116" stroke-opacity="0.15"/>
        <path d="M 22 70 L 38 70 L 38 50 L 58 50 L 58 90 L 78 90 L 78 60 L 98 60 L 98 80 L 138 80"/>
        <line x1="40" y1="132" x2="120" y2="132" stroke-opacity="0.5"/>
        <circle cx="40"  cy="132" r="3" stroke-opacity="0.5"/>
        <circle cx="80"  cy="132" r="3" stroke-opacity="0.5"/>
        <circle cx="120" cy="132" r="3" stroke-opacity="0.5"/>
      </g>
    </symbol>

    <!-- ─────────── g-vna: 2-port network analyzer + S21 ─────────── -->
    <symbol id="g-vna" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="40" y="40" width="80" height="80" rx="4" stroke-opacity="0.6"/>
        <text x="80" y="86" font-family="ui-monospace, monospace"
              font-size="20" font-weight="700" fill="currentColor"
              text-anchor="middle" stroke="none">S₂₁</text>
        <circle cx="24" cy="60"  r="6" stroke-opacity="0.85"/>
        <circle cx="24" cy="100" r="6" stroke-opacity="0.85"/>
        <line x1="30" y1="60"  x2="40" y2="60"/>
        <line x1="30" y1="100" x2="40" y2="100"/>
        <circle cx="136" cy="60"  r="6" stroke-opacity="0.85"/>
        <circle cx="136" cy="100" r="6" stroke-opacity="0.85"/>
        <line x1="120" y1="60"  x2="130" y2="60"/>
        <line x1="120" y1="100" x2="130" y2="100"/>
      </g>
    </symbol>

    <!-- ─────────── g-siggen: synthesized output sine ─────────── -->
    <symbol id="g-siggen" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="20" y="36" width="120" height="88" rx="6" stroke-opacity="0.7"/>
        <line x1="20" y1="64" x2="140" y2="64" stroke-opacity="0.4"/>
        <text x="80" y="58" font-family="ui-monospace, monospace"
              font-size="11" font-weight="700" fill="currentColor"
              text-anchor="middle" stroke="none">1.000 GHz</text>
        <path d="M 32 96 Q 44 76, 56 96 T 80 96 T 104 96 T 128 96"
              stroke-opacity="0.9"/>
        <circle cx="36"  cy="114" r="3" stroke-opacity="0.6"/>
        <circle cx="124" cy="114" r="3" stroke-opacity="0.6"/>
      </g>
    </symbol>

    <!-- ─────────── g-cmw: cellular/comms tester ─────────── -->
    <symbol id="g-cmw" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="22" y="30" width="116" height="100" rx="6" stroke-opacity="0.7"/>
        <line x1="22" y1="58" x2="138" y2="58" stroke-opacity="0.4"/>
        <circle cx="36" cy="44" r="3" fill="currentColor" stroke="none"/>
        <circle cx="48" cy="44" r="3" stroke-opacity="0.6"/>
        <!-- bars -->
        <line x1="40"  y1="118" x2="40"  y2="106" stroke-width="6" stroke-opacity="0.7"/>
        <line x1="56"  y1="118" x2="56"  y2="98"  stroke-width="6" stroke-opacity="0.8"/>
        <line x1="72"  y1="118" x2="72"  y2="86"  stroke-width="6" stroke-opacity="0.9"/>
        <line x1="88"  y1="118" x2="88"  y2="78"  stroke-width="6"/>
        <line x1="104" y1="118" x2="104" y2="92"  stroke-width="6" stroke-opacity="0.7"/>
        <line x1="120" y1="118" x2="120" y2="100" stroke-width="6" stroke-opacity="0.5"/>
      </g>
    </symbol>

    <!-- ─────────── g-stackup: PCB layer stack ─────────── -->
    <symbol id="g-stackup" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="16" y="36"  width="128" height="10" stroke-opacity="0.9"/>
        <rect x="16" y="50"  width="128" height="20" stroke-opacity="0.4"/>
        <rect x="16" y="74"  width="128" height="10" stroke-opacity="0.7"/>
        <rect x="16" y="88"  width="128" height="20" stroke-opacity="0.4"/>
        <rect x="16" y="112" width="128" height="10" stroke-opacity="0.9"/>
        <!-- via -->
        <line x1="100" y1="32" x2="100" y2="126" stroke-opacity="0.8"/>
        <circle cx="100" cy="32"  r="3" fill="currentColor" stroke="none"/>
        <circle cx="100" cy="126" r="3" fill="currentColor" stroke="none"/>
      </g>
    </symbol>

    <!-- ─────────── g-schematic: resistor + cap + node ─────────── -->
    <symbol id="g-schematic" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <!-- wire -->
        <line x1="16"  y1="56" x2="40"  y2="56"/>
        <!-- resistor zigzag -->
        <path d="M 40 56 L 46 48 L 56 64 L 66 48 L 76 64 L 86 48 L 92 56"/>
        <line x1="92"  y1="56" x2="120" y2="56"/>
        <!-- capacitor -->
        <line x1="120" y1="40" x2="120" y2="72"/>
        <line x1="128" y1="40" x2="128" y2="72"/>
        <line x1="128" y1="56" x2="144" y2="56"/>
        <!-- ground rail -->
        <line x1="80" y1="80" x2="80" y2="104"/>
        <line x1="60" y1="104" x2="100" y2="104"/>
        <line x1="68" y1="112" x2="92" y2="112" stroke-opacity="0.7"/>
        <line x1="74" y1="120" x2="86" y2="120" stroke-opacity="0.5"/>
        <!-- node dot -->
        <circle cx="80" cy="80" r="3" fill="currentColor" stroke="none"/>
        <line x1="80" y1="56" x2="80" y2="80" stroke-opacity="0.7"/>
      </g>
    </symbol>

    <!-- ─────────── g-emc-chamber: anechoic chamber w/ DUT ─────────── -->
    <symbol id="g-emc-chamber" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="20" y="36" width="120" height="92" rx="4" stroke-opacity="0.7"/>
        <!-- absorber teeth top + bottom -->
        <g stroke-opacity="0.55">
          <path d="M 28 36 L 32 46 L 36 36 L 40 46 L 44 36 L 48 46 L 52 36 L 56 46 L 60 36 L 64 46 L 68 36 L 72 46 L 76 36 L 80 46 L 84 36 L 88 46 L 92 36 L 96 46 L 100 36 L 104 46 L 108 36 L 112 46 L 116 36 L 120 46 L 124 36 L 128 46 L 132 36"/>
          <path d="M 28 128 L 32 118 L 36 128 L 40 118 L 44 128 L 48 118 L 52 128 L 56 118 L 60 128 L 64 118 L 68 128 L 72 118 L 76 128 L 80 118 L 84 128 L 88 118 L 92 128 L 96 118 L 100 128 L 104 118 L 108 128 L 112 118 L 116 128 L 120 118 L 124 128 L 128 118 L 132 128"/>
        </g>
        <!-- DUT -->
        <rect x="68" y="76" width="24" height="14" stroke-opacity="0.9"/>
        <!-- radiation arcs -->
        <path d="M 60 82 Q 50 82, 46 88" stroke-opacity="0.6"/>
        <path d="M 100 82 Q 110 82, 114 88" stroke-opacity="0.6"/>
      </g>
    </symbol>

    <!-- ─────────── g-cube: 3D wireframe (for blender / openems) ─────────── -->
    <symbol id="g-cube" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <!-- front face -->
        <path d="M 36 56 L 96 56 L 96 116 L 36 116 Z"/>
        <!-- back face -->
        <path d="M 64 32 L 124 32 L 124 92 L 96 116" stroke-opacity="0.7"/>
        <!-- connectors -->
        <line x1="36" y1="56" x2="64" y2="32" stroke-opacity="0.7"/>
        <line x1="96" y1="56" x2="124" y2="32" stroke-opacity="0.7"/>
        <line x1="96" y1="116" x2="124" y2="92" stroke-opacity="0.5"/>
        <!-- hidden edge -->
        <line x1="64" y1="32" x2="64" y2="92" stroke-opacity="0.3" stroke-dasharray="3,3"/>
        <line x1="64" y1="92" x2="124" y2="92" stroke-opacity="0.3" stroke-dasharray="3,3"/>
        <line x1="36" y1="116" x2="64" y2="92" stroke-opacity="0.3" stroke-dasharray="3,3"/>
      </g>
    </symbol>

    <!-- ─────────── g-diagram: linked nodes (drawio-style) ─────────── -->
    <symbol id="g-diagram" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="18" y="34"  width="44" height="28" rx="3"/>
        <rect x="98" y="34"  width="44" height="28" rx="3"/>
        <rect x="58" y="98"  width="44" height="28" rx="3"/>
        <line x1="62" y1="48" x2="98" y2="48" stroke-opacity="0.7"/>
        <line x1="40" y1="62" x2="74" y2="98" stroke-opacity="0.7"/>
        <line x1="120" y1="62" x2="86" y2="98" stroke-opacity="0.7"/>
        <!-- arrowheads -->
        <path d="M 98 48 L 92 44 L 92 52 Z" fill="currentColor" stroke="none"/>
        <path d="M 74 98 L 70 92 L 78 94 Z" fill="currentColor" stroke="none"/>
        <path d="M 86 98 L 90 92 L 82 94 Z" fill="currentColor" stroke="none"/>
      </g>
    </symbol>

    <!-- ─────────── g-terminal: SSH / shell prompt ─────────── -->
    <symbol id="g-terminal" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <rect x="16" y="32" width="128" height="96" rx="6" stroke-opacity="0.8"/>
        <line x1="16" y1="50" x2="144" y2="50" stroke-opacity="0.5"/>
        <circle cx="28" cy="41" r="3" stroke-opacity="0.6"/>
        <circle cx="40" cy="41" r="3" stroke-opacity="0.6"/>
        <circle cx="52" cy="41" r="3" stroke-opacity="0.6"/>
        <!-- prompt -->
        <path d="M 32 78 L 44 86 L 32 94"/>
        <line x1="52" y1="94" x2="92" y2="94"/>
        <!-- cursor block -->
        <rect x="32" y="106" width="12" height="14" stroke-opacity="0.85"/>
      </g>
    </symbol>

    <!-- ─────────── g-grid: full-wave mesh (HFSS etc.) ─────────── -->
    <symbol id="g-grid" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <g stroke-opacity="0.45">
          <line x1="24" y1="24" x2="136" y2="24"/>
          <line x1="24" y1="52" x2="136" y2="52"/>
          <line x1="24" y1="80" x2="136" y2="80"/>
          <line x1="24" y1="108" x2="136" y2="108"/>
          <line x1="24" y1="136" x2="136" y2="136"/>
          <line x1="24" y1="24" x2="24" y2="136"/>
          <line x1="52" y1="24" x2="52" y2="136"/>
          <line x1="80" y1="24" x2="80" y2="136"/>
          <line x1="108" y1="24" x2="108" y2="136"/>
          <line x1="136" y1="24" x2="136" y2="136"/>
        </g>
        <!-- diagonals to suggest tet mesh -->
        <g stroke-opacity="0.7">
          <line x1="24" y1="52" x2="52" y2="80"/>
          <line x1="52" y1="80" x2="80" y2="52"/>
          <line x1="80" y1="52" x2="108" y2="80"/>
          <line x1="108" y1="80" x2="136" y2="52"/>
          <line x1="24" y1="108" x2="52" y2="80"/>
          <line x1="80" y1="108" x2="52" y2="80"/>
          <line x1="80" y1="108" x2="108" y2="80"/>
          <line x1="136" y1="108" x2="108" y2="80"/>
        </g>
        <circle cx="80" cy="80" r="4" fill="currentColor" stroke="none"/>
      </g>
    </symbol>

    <!-- ─────────── g-transline: lineforge-style cross-section ─────────── -->
    <symbol id="g-transline" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <!-- dielectric slab -->
        <rect x="16" y="76" width="128" height="36" stroke-opacity="0.4"/>
        <!-- ground plane -->
        <rect x="16" y="112" width="128" height="6" stroke-opacity="0.9"/>
        <!-- ground hatch -->
        <g stroke-opacity="0.55">
          <line x1="24" y1="118" x2="20" y2="126"/>
          <line x1="38" y1="118" x2="34" y2="126"/>
          <line x1="52" y1="118" x2="48" y2="126"/>
          <line x1="66" y1="118" x2="62" y2="126"/>
          <line x1="80" y1="118" x2="76" y2="126"/>
          <line x1="94" y1="118" x2="90" y2="126"/>
          <line x1="108" y1="118" x2="104" y2="126"/>
          <line x1="122" y1="118" x2="118" y2="126"/>
          <line x1="136" y1="118" x2="132" y2="126"/>
        </g>
        <!-- conductor strip -->
        <rect x="64" y="64" width="32" height="12" stroke-opacity="0.95"/>
        <!-- field arcs -->
        <g stroke-opacity="0.7">
          <path d="M 96 68 Q 124 68, 132 90 Q 134 108, 128 112"/>
          <path d="M 64 68 Q 36 68, 28 90 Q 26 108, 32 112"/>
          <line x1="74" y1="76" x2="74" y2="112" stroke-opacity="0.45"/>
          <line x1="86" y1="76" x2="86" y2="112" stroke-opacity="0.45"/>
        </g>
      </g>
    </symbol>

    <!-- ─────────── g-hex: umbrella mark for eng-mcp-suite itself ─────────── -->
    <symbol id="g-hex" viewBox="0 0 160 160">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M 80 16 L 138 50 L 138 110 L 80 144 L 22 110 L 22 50 Z"/>
        <path d="M 80 36 L 121 60 L 121 100 L 80 124 L 39 100 L 39 60 Z"
              stroke-opacity="0.55"/>
        <!-- inner mark: 3 connected nodes (the suite) -->
        <circle cx="80" cy="62" r="6"/>
        <circle cx="56" cy="98" r="6"/>
        <circle cx="104" cy="98" r="6"/>
        <line x1="80" y1="68" x2="58" y2="92" stroke-opacity="0.7"/>
        <line x1="80" y1="68" x2="102" y2="92" stroke-opacity="0.7"/>
        <line x1="62" y1="98" x2="98" y2="98" stroke-opacity="0.7"/>
      </g>
    </symbol>

  </defs>
</svg>
